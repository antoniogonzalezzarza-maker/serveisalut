<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Oposicions – Temes 12 i 13 | IB-Salut</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1D9E75;--green-l:#E1F5EE;--green-d:#0F6E56;
  --blue:#2563EB;--blue-l:#EFF6FF;
  --red:#DC2626;--red-l:#FEF2F2;
  --amber:#D97706;--amber-l:#FFFBEB;
  --purple:#7C3AED;--purple-l:#F5F3FF;
  --g50:#F9FAFB;--g100:#F3F4F6;--g200:#E5E7EB;--g300:#D1D5DB;--g400:#9CA3AF;--g500:#6B7280;--g600:#4B5563;--g700:#374151;--g800:#1F2937;--g900:#111827;
  --r:10px;--rl:14px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--g50);color:var(--g900);min-height:100vh}
.app{max-width:780px;margin:0 auto;padding:24px 16px 56px}
/* header */
.header{text-align:center;margin-bottom:28px}
.badge{display:inline-flex;align-items:center;gap:6px;background:var(--green-l);color:var(--green-d);font-size:12px;font-weight:600;padding:4px 14px;border-radius:20px;margin-bottom:12px;letter-spacing:.04em;text-transform:uppercase}
.header h1{font-size:26px;font-weight:700;margin-bottom:5px}
.header p{font-size:15px;color:var(--g500)}
/* score banner — live during test */
.score-live{display:flex;align-items:center;justify-content:space-between;gap:8px;background:#fff;border:1px solid var(--g200);border-radius:var(--rl);padding:12px 18px;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.score-live-item{text-align:center;min-width:60px}
.sl-val{font-size:20px;font-weight:700;line-height:1}
.sl-lbl{font-size:11px;color:var(--g400);margin-top:2px;text-transform:uppercase;letter-spacing:.04em}
.sl-val.score{color:var(--g900)}
.sl-val.ok{color:var(--green)}
.sl-val.ng{color:var(--red)}
.sl-val.pend{color:var(--g400)}
.score-bar-wrap{flex:1;min-width:120px}
.score-bar-track{height:8px;background:var(--g100);border-radius:4px;overflow:hidden;position:relative}
.score-bar-fill{height:100%;border-radius:4px;transition:width .4s,background .4s}
.score-bar-labels{display:flex;justify-content:space-between;margin-top:4px;font-size:11px;color:var(--g400)}
.score-threshold{position:absolute;top:0;bottom:0;width:2px;background:#D97706;opacity:.7}
/* tabs */
.tabs{display:flex;background:#fff;border:1px solid var(--g200);border-radius:var(--rl);padding:4px;gap:4px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.tab{flex:1;padding:10px 6px;border:none;background:transparent;border-radius:8px;font-size:13px;font-weight:500;color:var(--g500);cursor:pointer;line-height:1.3;text-align:center;transition:all .15s}
.tab.on{background:var(--green);color:#fff;box-shadow:0 1px 3px rgba(29,158,117,.3)}
.tab:hover:not(.on){background:var(--g100);color:var(--g800)}
/* mode */
.modes{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.mbtn{display:flex;align-items:center;gap:6px;padding:8px 14px;border:1.5px solid var(--g200);border-radius:8px;background:#fff;font-size:13px;font-weight:500;color:var(--g500);cursor:pointer;transition:all .15s}
.mbtn.on{border-color:var(--green);color:var(--green-d);background:var(--green-l)}
.mbtn.dim{opacity:.38;pointer-events:none}
/* progress */
.prog-wrap{margin-bottom:16px}
.prog-top{display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px;color:var(--g500)}
.prog-top b{color:var(--g800)}
.prog-track{height:5px;background:var(--g200);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--g300);border-radius:3px;transition:width .3s}
/* card */
.qcard{background:#fff;border:1px solid var(--g200);border-radius:var(--rl);padding:24px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.qtag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em}
.qtag.bal{background:#E0F2FE;color:#0369A1}
.qtag.rev{background:var(--amber-l);color:var(--amber)}
.qnum{font-size:12px;color:var(--g400);margin-bottom:6px;font-weight:500}
.qtext{font-size:16px;font-weight:600;color:var(--g900);line-height:1.5;margin-bottom:18px}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border:1.5px solid var(--g200);border-radius:var(--r);cursor:pointer;transition:all .12s;background:#fff;text-align:left;width:100%;font-size:15px;color:var(--g800);line-height:1.4}
.opt:hover:not(.dis){border-color:var(--green);background:var(--green-l)}
.opt.ok{border-color:var(--green);background:var(--green-l);color:var(--green-d)}
.opt.ng{border-color:var(--red);background:var(--red-l);color:var(--red)}
.opt.dis{cursor:default}
.ol{font-weight:700;font-size:13px;min-width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1.5px solid currentColor;flex-shrink:0;margin-top:1px}
.opt.ok .ol{background:var(--green);color:#fff;border-color:var(--green)}
.opt.ng .ol{background:var(--red);color:#fff;border-color:var(--red)}
.score-delta{font-size:12px;font-weight:600;padding:3px 8px;border-radius:6px;margin-left:auto;flex-shrink:0;align-self:center}
.score-delta.pos{background:var(--green-l);color:var(--green-d)}
.score-delta.neg{background:var(--red-l);color:var(--red)}
.expl{margin-top:14px;padding:12px 14px;background:var(--g50);border-left:3px solid var(--green);border-radius:0 8px 8px 0;font-size:14px;color:var(--g600);line-height:1.6;display:none}
.expl.on{display:block}
.expl strong{color:var(--g900)}
/* nav */
.nav{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:4px}
.nbtn{display:flex;align-items:center;gap:6px;padding:10px 18px;border:1.5px solid var(--g200);border-radius:8px;background:#fff;font-size:14px;font-weight:500;color:var(--g600);cursor:pointer;transition:all .12s}
.nbtn:hover:not(:disabled){border-color:var(--g400);color:var(--g900)}
.nbtn:disabled{opacity:.32;cursor:not-allowed}
.nbtn.pri{background:var(--green);color:#fff;border-color:var(--green)}
.nbtn.pri:hover:not(:disabled){background:var(--green-d)}
.nctr{font-size:13px;color:var(--g400)}
/* results */
.rhero{background:#fff;border:1px solid var(--g200);border-radius:var(--rl);padding:32px 24px;text-align:center;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.ring{width:120px;height:120px;margin:0 auto 16px;position:relative}
.ring svg{width:120px;height:120px;transform:rotate(-90deg)}
.rtext{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.rpts{font-size:26px;font-weight:700;line-height:1}
.rover{font-size:13px;color:var(--g400)}
.raprueba{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-size:13px;font-weight:600;margin-bottom:16px}
.raprueba.si{background:var(--green-l);color:var(--green-d)}
.raprueba.no{background:var(--red-l);color:var(--red)}
.rtitle{font-size:19px;font-weight:700;margin-bottom:5px}
.rsub{font-size:14px;color:var(--g500);margin-bottom:22px}
.rstats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:6px}
.sc{background:var(--g50);border-radius:var(--r);padding:12px 8px;text-align:center}
.sn{font-size:20px;font-weight:700}
.sn.g{color:var(--green)}.sn.r{color:var(--red)}.sn.a{color:var(--amber)}.sn.gr{color:var(--g500)}
.sl2{font-size:11px;color:var(--g400);margin-top:2px}
/* formula box */
.formula{background:var(--g50);border:1px solid var(--g200);border-radius:var(--r);padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--g600);display:flex;gap:16px;flex-wrap:wrap;align-items:center;justify-content:center}
.formula span{display:flex;align-items:center;gap:5px}
.formula b{color:var(--g800)}
/* threshold line in results */
.threshold-note{font-size:13px;margin-top:12px;padding:10px 14px;border-radius:8px;text-align:center}
.threshold-note.pass{background:var(--green-l);color:var(--green-d)}
.threshold-note.fail{background:var(--red-l);color:var(--red)}
/* breakdown */
.bdown{background:#fff;border:1px solid var(--g200);border-radius:var(--rl);padding:20px 24px;margin-bottom:16px}
.bdown h3{font-size:14px;font-weight:600;margin-bottom:14px;color:var(--g700);text-transform:uppercase;letter-spacing:.04em}
.trow{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.tlbl{font-size:13px;font-weight:500;color:var(--g700);min-width:76px}
.tbar{flex:1;background:var(--g100);border-radius:4px;height:8px;overflow:hidden;position:relative}
.tbfill{height:100%;border-radius:4px;transition:width .6s}
.tpct{font-size:13px;font-weight:600;min-width:52px;text-align:right}
.tth{position:absolute;top:0;bottom:0;width:2px;background:var(--amber)}
/* actions */
.ract{display:flex;gap:10px;flex-wrap:wrap}
.abtn{flex:1;min-width:130px;display:flex;align-items:center;justify-content:center;gap:8px;padding:12px 16px;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.abtn.pri{background:var(--green);color:#fff}
.abtn.pri:hover{background:var(--green-d)}
.abtn.sec{background:var(--amber-l);color:var(--amber);border:1.5px solid #FDE68A}
.abtn.sec:hover{background:#FEF3C7}
.abtn.dim{opacity:.38;cursor:not-allowed;pointer-events:none}
.footer{text-align:center;margin-top:32px;font-size:12px;color:var(--g400)}
@media(max-width:500px){.rstats{grid-template-columns:repeat(2,1fr)}.header h1{font-size:21px}.tab{font-size:12px;padding:8px 3px}}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="badge">Grup Tècnic · Funció Administrativa · IB-Salut</div>
    <h1>Test d'Oposicions</h1>
    <p>Temes 12 i 13 — L'Estat de les Autonomies</p>
  </header>
  <div class="tabs">
    <button class="tab on" id="tab-12" onclick="switchTema(12)">Tema 12<br><span style="font-weight:400;font-size:11px">Autonomies (I)</span></button>
    <button class="tab" id="tab-13" onclick="switchTema(13)">Tema 13<br><span style="font-weight:400;font-size:11px">Autonomies (II)</span></button>
    <button class="tab" id="tab-all" onclick="switchTema('all')">Tot el temari<br><span style="font-weight:400;font-size:11px">40 preguntes</span></button>
  </div>
  <div id="area"></div>
  <footer class="footer">Servei de Salut de les Illes Balears · Material de preparació · 2025</footer>
</div>
<script>
const RAW={"t12":[{"q":"¿Cuál es el contenido mínimo que debe incluir todo Estatuto de Autonomía según el art. 147.2 CE?","opts":["Denominación de la CA, delimitación del territorio, instituciones propias y competencias asumidas","Denominación, capital, lengua propia y financiación","Símbolos, territorio, gobierno autonómico y reforma","Denominación, derechos de los ciudadanos, instituciones y relaciones con el Estado"],"c":0,"exp":"El art. 147.2 CE establece como contenido mínimo obligatorio: denominación de la CA, delimitación del territorio, denominación y sede de las instituciones propias, y competencias asumidas dentro del marco constitucional."},{"q":"¿Cuáles son los cinco principios estructurantes del Estado de las Autonomías?","opts":["Unidad, autonomía, dispositivo, solidaridad y coordinación","Unidad, igualdad, descentralización, cooperación y eficacia","Soberanía, autonomía, igualdad, subsidiariedad y solidaridad","Territorialidad, dispositivo, federalismo, solidaridad y eficacia"],"c":0,"exp":"Los cinco principios son: unidad (art. 2 CE), autonomía (arts. 2 y 137 CE), dispositivo o de voluntariedad, solidaridad (arts. 2 y 138-158 CE) y coordinación (art. 103 CE)."},{"q":"¿Cuántas Comunidades Autónomas y Ciudades Autónomas existen actualmente en España?","opts":["17 Comunidades Autónomas y 2 Ciudades Autónomas","15 Comunidades Autónomas y 2 Ciudades Autónomas","19 Comunidades Autónomas y ninguna Ciudad Autónoma","17 Comunidades Autónomas y 3 Ciudades Autónomas"],"c":0,"exp":"Existen 17 Comunidades Autónomas y 2 Ciudades Autónomas (Ceuta y Melilla), constituidas por la vía del art. 144 CE mediante Leyes Orgánicas 1 y 2 de 1995."},{"q":"¿Qué artículo de la CE organiza el territorio del Estado en municipios, provincias y Comunidades Autónomas?","opts":["Art. 137 CE","Art. 2 CE","Art. 103 CE","Art. 148 CE"],"c":0,"exp":"El art. 137 CE establece que el Estado se organiza territorialmente en municipios, provincias y CCAA, todas con autonomía para la gestión de sus respectivos intereses."},{"q":"¿Qué afirma el Tribunal Constitucional sobre la relación entre autonomía y soberanía?","opts":["La autonomía no es soberanía: las CCAA ejercen poderes limitados derivados de la CE","La autonomía autonómica equivale a soberanía limitada","Las CCAA pueden ejercer soberanía en materias exclusivas","La autonomía política implica reconocimiento de soberanía compartida"],"c":0,"exp":"El TC ha reiterado que la autonomía no es soberanía. Las CCAA tienen capacidad de autogobierno dentro del marco constitucional, pero no soberanía propia."},{"q":"[BALEARES] ¿Por qué vía accedió Illes Balears a la autonomía y cuál es su Estatuto actualmente vigente?","opts":["Vía art. 151 CE; Estatuto LO 2/1983","Vía art. 143 CE; Estatuto LO 1/2007","Vía art. 144 CE; Estatuto LO 3/1999","Vía art. 151 CE; Estatuto LO 1/2007"],"c":1,"bal":true,"exp":"Illes Balears accedió por la vía ordinaria del art. 143 CE. El Estatuto vigente es la LO 1/2007, de 28 de febrero, que sustituyó al original LO 2/1983."},{"q":"El principio de solidaridad interterritorial en su dimensión negativa prohíbe fundamentalmente:","opts":["La creación de impuestos propios por las CCAA","Adoptar medidas que obstaculicen la libre circulación de personas, bienes o servicios","La suscripción de convenios entre CCAA sin autorización estatal","Que una CA tenga más competencias que otra"],"c":1,"exp":"El art. 139 CE prohíbe medidas que directa o indirectamente obstaculicen la libre circulación y la igualdad básica en el territorio español (dimensión negativa de la solidaridad)."},{"q":"La vía especial o rápida del art. 151 CE exigía la ratificación mediante referéndum por:","opts":["Mayoría absoluta del censo electoral de la región","Mayoría de votos válidos emitidos en cada provincia","Mayoría de 3/5 de la población de la región","Mayoría simple en votación conjunta de todas las provincias"],"c":1,"exp":"El art. 151 CE exigía ratificación en referéndum por mayoría de votos válidos emitidos en cada provincia. Accedieron por esta vía Cataluña, País Vasco, Galicia y Andalucía."},{"q":"Los Estatutos de Autonomía son aprobados formalmente como:","opts":["Leyes ordinarias de las Cortes Generales","Leyes orgánicas de las Cortes Generales","Decretos legislativos del Gobierno","Reglamentos de las Asambleas autonómicas"],"c":1,"exp":"Los Estatutos se aprueban como leyes orgánicas por las Cortes Generales (arts. 81 y 147.3 CE). Son normas bifrontes: estatales en su forma y autonómicas en su origen."},{"q":"[BALEARES] La reforma del Estatuto de Autonomía de Illes Balears vigente (LO 1/2007) requiere:","opts":["Solo aprobación del Parlament de les Illes Balears","Aprobación del Parlament, de las Cortes Generales y referéndum para materias esenciales","Únicamente aprobación de las Cortes Generales","Referéndum obligatorio en todos los casos sin intervención de las Cortes"],"c":1,"bal":true,"exp":"El Estatuto de Illes Balears (LO 1/2007) exige aprobación del Parlament y de las Cortes Generales mediante ley orgánica, más referéndum ciudadano para materias esenciales."},{"q":"¿En qué artículo de la Constitución se recoge el principio dispositivo o de voluntariedad?","opts":["Art. 137 CE","Art. 143 CE","Art. 2 CE","Art. 151 CE"],"c":2,"exp":"El art. 2 CE proclama la indisoluble unidad de la Nación española y reconoce el derecho a la autonomía de las nacionalidades y regiones, siendo la base del principio dispositivo."},{"q":"¿Qué normas integran el llamado 'bloque de constitucionalidad'?","opts":["Solo la Constitución Española","La CE, las leyes orgánicas y los reglamentos parlamentarios","La CE, los Estatutos de Autonomía y las leyes orgánicas del art. 150 CE","La CE, los Estatutos, las leyes básicas y los tratados internacionales"],"c":2,"exp":"El bloque de constitucionalidad (STC 76/1983) integra la CE, los Estatutos de Autonomía y las leyes orgánicas previstas en el art. 150 CE. Sirve de parámetro para enjuiciar la distribución de competencias."},{"q":"¿Qué instrumento del art. 158.2 CE tiene como finalidad corregir los desequilibrios económicos interterritoriales?","opts":["El sistema de financiación autonómica LOFCA","El Presupuesto General del Estado","El Fondo de Compensación Interterritorial","Los convenios de colaboración entre CCAA"],"c":2,"exp":"El Fondo de Compensación Interterritorial (art. 158.2 CE) se destina a gastos de inversión en territorios menos desarrollados para hacer efectivo el principio de solidaridad."},{"q":"El TC ha señalado (STC 135/1992) que el principio de solidaridad:","opts":["Implica la igualación absoluta de rentas entre territorios","Prohíbe que una CA tenga mejores servicios que otra","No implica uniformidad ni igualación absoluta, sino que prohíbe diferencias injustificadas","Obliga a las CCAA a transferir parte de sus ingresos al Estado"],"c":2,"exp":"El TC señala que la solidaridad prohíbe diferencias injustificadas, no las derivadas del ejercicio legítimo de competencias propias."},{"q":"La naturaleza 'bifronte' de los Estatutos de Autonomía significa que:","opts":["Son normas que pueden reformarse por el Estado o la CA unilateralmente","Tienen doble eficacia: directa en la CA e indirecta en el resto del Estado","Son simultáneamente norma estatal (ley orgánica) y norma autonómica (parámetro de constitucionalidad)","Pueden ser aplicados tanto por tribunales ordinarios como por el TC"],"c":2,"exp":"El TC define al Estatuto como norma bifronte: es ley orgánica estatal en su forma, pero también es la norma fundacional del autogobierno autonómico y parámetro de constitucionalidad autonómica."},{"q":"¿Qué Comunidades Autónomas accedieron por la disposición transitoria 2.ª de la Constitución?","opts":["Cataluña, País Vasco y Andalucía","Galicia, Andalucía y Navarra","Cataluña, Galicia y Navarra","Cataluña, País Vasco y Galicia"],"c":3,"exp":"Cataluña, País Vasco y Galicia accedieron por la disposición transitoria 2.ª, al haber plebiscitado afirmativamente proyectos de Estatuto antes de 1978. Andalucía siguió el procedimiento del art. 151."},{"q":"La vía ordinaria de acceso a la autonomía (art. 143 CE) exigía la iniciativa de las Diputaciones y de qué porcentaje de municipios:","opts":["La mayoría absoluta de los municipios","Las tres cuartas partes de los municipios","La mitad más uno de los municipios de cada provincia","Las dos terceras partes de los municipios que representaran la mayoría del censo"],"c":3,"exp":"El art. 143 CE requería la iniciativa de las Diputaciones y de las dos terceras partes de los municipios cuya población representara la mayoría del censo electoral."},{"q":"El principio de coordinación se distingue del de cooperación porque:","opts":["La cooperación opera entre CCAA, y la coordinación entre el Estado y las CCAA","La coordinación solo opera en materia financiera, la cooperación en el resto","La cooperación la ejerce el TC y la coordinación el Gobierno","La coordinación puede imponerse por ley, mientras que la cooperación es voluntaria"],"c":3,"exp":"La coordinación puede imponerse mediante ley (competencias exclusivas, legislación básica, leyes de armonización, Conferencias Sectoriales). La cooperación tiene carácter voluntario."},{"q":"¿Qué tipo de autonomía tienen las CCAA según la doctrina constitucional?","opts":["Autonomía meramente administrativa, similar a la local","Autonomía cuasi-soberana en las materias exclusivas","Autonomía federalista con derecho a secesión regulado","Autonomía política, que incluye potestad legislativa propia"],"c":3,"exp":"La autonomía de las CCAA es autonomía política, no meramente administrativa. Incluye potestad legislativa propia, gobierno y administración autonómica y hacienda propia (art. 156 CE)."},{"q":"¿Qué precepto constitucional permite al Estado adoptar medidas coercitivas si una CA incumple gravemente la Constitución o las leyes?","opts":["Art. 149 CE","Art. 150.3 CE","Art. 138 CE","Art. 155 CE"],"c":3,"exp":"El art. 155 CE permite al Gobierno adoptar medidas coercitivas previo requerimiento al Presidente de la CA y aprobación por mayoría absoluta del Senado. Es la cláusula de garantía última del Estado autonómico."}],"t13":[{"q":"¿Cuál es la función del Presidente de la Comunidad Autónoma según el art. 152.1 CE?","opts":["Dirige el Gobierno, ostenta su más alta representación y ejerce la representación ordinaria del Estado en la CA","Solo ostenta la representación simbólica de la CA ante el Estado","Ejerce funciones ejecutivas y legislativas conjuntamente","Actúa como árbitro entre el Parlamento autonómico y el Gobierno central"],"c":0,"exp":"El art. 152.1 CE establece que el Presidente de la CA dirige el Gobierno, ostenta la más alta representación de la CA y ejerce la representación ordinaria del Estado en la CA."},{"q":"El art. 149.1.16.ª CE atribuye al Estado competencia exclusiva en:","opts":["Sanidad exterior; bases y coordinación general de la sanidad","La gestión de los servicios sanitarios de todas las CCAA","La ordenación de las profesiones sanitarias en todo el territorio","La financiación de los hospitales públicos de toda España"],"c":0,"exp":"El art. 149.1.16.ª CE atribuye al Estado competencia sobre sanidad exterior y las bases y coordinación general de la sanidad. Las CCAA tienen competencias de desarrollo y ejecución."},{"q":"¿En qué materia reconoce expresamente el art. 149.2 CE la existencia de competencias concurrentes entre Estado y CCAA?","opts":["Cultura","Educación","Medio ambiente","Turismo"],"c":0,"exp":"El art. 149.2 CE reconoce en materia de cultura la competencia concurrente: tanto el Estado como las CCAA pueden actuar simultáneamente sin que las actuaciones de uno desplacen las del otro."},{"q":"Según el TC (STC 32/1981), ¿cuál es el criterio material para determinar qué normas son 'básicas'?","opts":["Que establezcan el común denominador normativo para asegurar los intereses generales e igualdad básica de todos los ciudadanos","Que sean aprobadas por ley orgánica en el BOE","Que se apliquen en todo el territorio sin excepción","Que sean dictadas por el Gobierno central mediante decreto"],"c":0,"exp":"Según la STC 32/1981, son básicas las normas que establecen el denominador común normativo necesario para garantizar los intereses generales y la igualdad básica de todos los ciudadanos."},{"q":"[BALEARES] ¿Qué ley desarrolla en Illes Balears las bases estatales en materia sanitaria (Ley 14/1986 y Ley 16/2003)?","opts":["La Ley 5/2003, de salut de les Illes Balears","La Ley 5/1999, de ordenación sanitaria de Baleares","El Decreto 39/2006, de estatutos del IB-Salut","La Ley 7/2010, del sector público instrumental de la CA"],"c":0,"bal":true,"exp":"La Ley 5/2003, de 4 de abril, de salut de les Illes Balears, desarrolla y adapta al territorio balear las bases estatales en sanidad y crea el Servei de Salut de les Illes Balears (IB-Salut)."},{"q":"[BALEARES] Los Consells Insulars de Illes Balears son:","opts":["Órganos consultivos de la Administración autonómica sin competencias propias","Órganos de gobierno, administración y representación de cada isla, con naturaleza de entidades locales y competencias propias","Delegaciones del Govern de les Illes Balears en cada isla","Comisiones parlamentarias con funciones de control insular"],"c":1,"bal":true,"exp":"Los Consells Insulars son los órganos de gobierno, administración y representación de cada isla. El Estatuto (art. 61 LO 1/2007) les reconoce autonomía institucional, funcional y financiera."},{"q":"En el esquema de competencias compartidas, ¿cuál es el papel de las CCAA?","opts":["Solo ejecutar lo que el Estado legisla, sin capacidad normativa propia","Aprobar legislación de desarrollo y ejecutar las políticas en su territorio, respetando las bases estatales","Sustituir la legislación estatal básica por su propia normativa","Proponer al Estado las normas básicas que luego este aprueba"],"c":1,"exp":"En el sistema bases/desarrollo, las CCAA aprueban legislación de desarrollo y ejecutan las políticas. Deben respetar el mínimo estatal pero pueden establecer estándares superiores de protección."},{"q":"[BALEARES] El Síndic de Greuges de Illes Balears es:","opts":["El órgano de fiscalización económica de la Hacienda autonómica","El comisionado del Parlament para la defensa de los derechos fundamentales frente a la Administración autonómica","El magistrado que preside el TSJIB","El órgano consultivo superior de la CA en materia jurídica"],"c":1,"bal":true,"exp":"El Síndic de Greuges es el Defensor del Pueblo autonómico de Illes Balears: comisionado del Parlament para la defensa de los derechos fundamentales y libertades públicas frente a la Administración autonómica."},{"q":"En materia de legislación laboral, ¿qué esquema competencial establece el art. 149.1.7.ª CE?","opts":["Competencia exclusiva de las CCAA en sus territorios","El Estado legisla y las CCAA ejecutan esa legislación","Competencias compartidas: Estado bases, CCAA desarrollo y ejecución","Las CCAA legislan dentro del marco fijado por leyes marco estatales"],"c":1,"exp":"En legislación laboral (art. 149.1.7.ª), el Estado conserva la competencia legislativa plena y las CCAA ejecutan esa legislación a través de sus propias estructuras administrativas."},{"q":"Las Conferencias Sectoriales son instrumentos de:","opts":["Cooperación voluntaria exclusivamente entre CCAA","Coordinación entre el Gobierno estatal y los Gobiernos autonómicos en áreas sectoriales","Control del Estado sobre la actividad legislativa de las CCAA","Negociación de los Estatutos de Autonomía"],"c":1,"exp":"Las Conferencias Sectoriales son foros de coordinación entre el Gobierno estatal y los Gobiernos autonómicos. En sanidad, el órgano central es el Consejo Interterritorial del SNS."},{"q":"[BALEARES] ¿Qué órgano ejerce la función legislativa autonómica en Illes Balears?","opts":["El Consell de Govern","El Govern de les Illes Balears","El Parlament de les Illes Balears","El Consell Consultiu"],"c":2,"bal":true,"exp":"En Illes Balears, la Asamblea Legislativa se denomina Parlament de les Illes Balears (art. 21 del Estatuto LO 1/2007). Ejerce la potestad legislativa autonómica, aprueba el presupuesto y controla al Govern."},{"q":"¿Qué instrumento del art. 150 CE permite al Estado transferir o delegar en las CCAA competencias propias del art. 149.1?","opts":["Las leyes marco (art. 150.1)","Las leyes de armonización (art. 150.3)","Las leyes de transferencia o delegación (art. 150.2)","Los convenios de colaboración (art. 145.2)"],"c":2,"exp":"Las leyes de transferencia o delegación del art. 150.2 CE permiten que el Estado transfiera o delegue en las CCAA competencias propias, incluso exclusivas del art. 149.1."},{"q":"¿Cuál de las siguientes materias es competencia exclusiva del Estado según el art. 149.1 CE?","opts":["Turismo","Urbanismo","Relaciones internacionales","Montes y aprovechamientos forestales"],"c":2,"exp":"Las relaciones internacionales son competencia exclusiva del Estado (art. 149.1.3.ª CE). Turismo, urbanismo, montes y aprovechamientos forestales son materias que pueden ser asumidas por las CCAA."},{"q":"¿Qué tipo de competencia es la más frecuente y compleja del sistema autonómico español?","opts":["Las competencias exclusivas de las CCAA","Las competencias concurrentes","Las competencias compartidas bases/desarrollo","Las competencias delegadas por el art. 150.2 CE"],"c":2,"exp":"Las competencias compartidas (bases estatales + desarrollo y ejecución autonómica) son el tipo más frecuente y complejo. El Estado fija los mínimos normativos comunes y las CCAA los desarrollan y ejecutan."},{"q":"¿Qué artículo de la CE autoriza los convenios de colaboración entre el Estado y las CCAA?","opts":["Art. 149 CE","Art. 150.2 CE","Art. 145.2 CE","Art. 155 CE"],"c":2,"exp":"El art. 145.2 CE regula los convenios de colaboración entre el Estado y las CCAA, y entre CCAA entre sí. Son el instrumento básico de cooperación voluntaria."},{"q":"[BALEARES] El Tribunal Superior de Justícia de les Illes Balears (TSJIB):","opts":["Es el máximo órgano jurisdiccional de Baleares en materia constitucional","Sustituye al Tribunal Supremo en todas las materias de derecho balear","Es un órgano de la Administración de justicia dependiente del Govern","Corona la organización judicial en el territorio autonómico, sin perjuicio de la jurisdicción del Tribunal Supremo"],"c":3,"bal":true,"exp":"El TSJIB (art. 152.1 CE) corona la organización judicial en el territorio de Illes Balears, sin perjuicio de la jurisdicción del Tribunal Supremo."},{"q":"[BALEARES] El Consell Consultiu de Illes Balears es:","opts":["El órgano de gobierno de los jueces en la CA","El consejo económico y social de la comunidad autónoma","El órgano de control del Parlament sobre el Govern","El órgano consultivo superior de la CA que emite dictámenes preceptivos sobre proyectos de ley y reglamentos"],"c":3,"bal":true,"exp":"El Consell Consultiu es el órgano consultivo superior de la CA de Illes Balears. Emite dictámenes preceptivos sobre proyectos de ley y reglamentos, con funciones análogas al Consejo de Estado."},{"q":"[BALEARES] ¿Qué institución de Illes Balears es el equivalente autonómico del Tribunal de Cuentas?","opts":["La Sindicatura de Greuges","El Consell Consultiu","El Tribunal Superior de Justícia de les Illes Balears","La Sindicatura de Comptes"],"c":3,"bal":true,"exp":"La Sindicatura de Comptes es el órgano de fiscalización externa de las cuentas públicas de la CA de Illes Balears y sus entes dependientes, equivalente al Tribunal de Cuentas en el ámbito autonómico."},{"q":"Según la jurisprudencia constitucional, las 'bases' estatales deben:","opts":["Agotar la regulación de la materia, dejando solo la ejecución a las CCAA","Ser aprobadas siempre por ley orgánica","Sustituir a la legislación autonómica previa en la materia","Establecer el común denominador normativo necesario y dejar espacio real para el desarrollo autonómico"],"c":3,"exp":"Las bases deben establecer denominadores comunes indispensables para garantizar la igualdad (STC 32/1981) y deben dejar un espacio real para el desarrollo normativo autonómico."},{"q":"¿Por qué el TC ha interpretado restrictivamente las leyes de armonización del art. 150.3 CE?","opts":["Porque solo pueden regular materias de competencia exclusiva del Estado","Porque requieren mayoría de 3/5 de cada cámara para su aprobación","Porque solo pueden usarse en materias presupuestarias o financieras","Porque requieren necesidad real de armonización y efectiva divergencia autonómica problemática (STC 76/1983)"],"c":3,"exp":"La STC 76/1983 estableció que las leyes de armonización exigen necesidad real que justifique el interés general y que las divergencias autonómicas causen un problema efectivo. Es el instrumento menos utilizado."}]};
const LT=['a','b','c','d'];
const PASS=15; // minimum score to pass
const TOTAL_SCORE=30; // maximum score

function buildQ(t){
  if(t==='all')return[...RAW.t12.map((q,i)=>({...q,_t:12,_i:i})),...RAW.t13.map((q,i)=>({...q,_t:13,_i:i}))];
  return(t===12?RAW.t12:RAW.t13).map((q,i)=>({...q,_t:t,_i:i}));
}

// Scoring formula: +30/N per correct, -(30/N)/4 per wrong, no blanks allowed
function scorePerQ(n){ return TOTAL_SCORE/n; }
function calcScore(ans,qs){
  const pq=scorePerQ(qs.length);
  let s=0;
  qs.forEach((q,i)=>{ if(ans[i]===undefined)return; if(ans[i]===q.c)s+=pq; else s-=pq/4; });
  return s;
}
function fmt(n){ return n.toFixed(3).replace('.',','); }
function fmtShort(n){ return (Math.round(n*100)/100).toFixed(2).replace('.',','); }

let tema=12,qs=[],ans={},cur=0,mode='normal',wrongs=[],done=false;
qs=buildQ(12);

function switchTema(t){
  tema=t;qs=buildQ(t);ans={};cur=0;mode='normal';wrongs=[];done=false;
  ['12','13','all'].forEach(k=>document.getElementById('tab-'+k).className='tab');
  document.getElementById('tab-'+t).className='tab on';
  render();
}
function startReview(){
  if(!wrongs.length)return;
  mode='review';qs=wrongs.map(w=>buildQ(tema)[w]);ans={};cur=0;done=false;render();
}
function reset(){ans={};cur=0;done=false;qs=mode==='review'?wrongs.map(w=>buildQ(tema)[w]):buildQ(tema);render();}
function pick(qi,oi){if(ans[qi]!==undefined)return;ans[qi]=oi;render();}
function go(d){cur=Math.max(0,Math.min(qs.length-1,cur+d));render();}
function finish(){
  done=true;
  const base=buildQ(tema);
  wrongs=[];
  qs.forEach((q,i)=>{if(ans[i]!==q.c)wrongs.push(base.findIndex(b=>b._t===q._t&&b._i===q._i));});
  render();
}
function pct(a,b){return b?Math.round(a/b*100):0;}
function scoreColor(s,total){
  const ratio=s/total;
  if(s<0)return'#DC2626';
  if(ratio>=0.5)return'#1D9E75';
  if(ratio>=0.35)return'#D97706';
  return'#DC2626';
}

function renderScoreLive(){
  const n=qs.length,pq=scorePerQ(n);
  const answered=Object.keys(ans).length;
  const ok=qs.filter((q,i)=>ans[i]===q.c).length;
  const ng=qs.filter((q,i)=>ans[i]!==undefined&&ans[i]!==q.c).length;
  const pending=n-answered;
  const score=calcScore(ans,qs);
  const maxReachable=score+(pending*pq);
  const col=scoreColor(score,TOTAL_SCORE);
  const threshPct=Math.min(100,(PASS/TOTAL_SCORE)*100);
  const scorePct=Math.max(0,Math.min(100,(score/TOTAL_SCORE)*100));
  return `<div class="score-live">
    <div class="score-live-item"><div class="sl-val score" style="color:${col}">${fmtShort(score)}</div><div class="sl-lbl">Punts / 30</div></div>
    <div class="score-live-item"><div class="sl-val ok">${ok}</div><div class="sl-lbl">Correctes</div></div>
    <div class="score-live-item"><div class="sl-val ng">${ng}</div><div class="sl-lbl">Errònies</div></div>
    <div class="score-live-item"><div class="sl-val pend">${pending}</div><div class="sl-lbl">Pendents</div></div>
    <div class="score-bar-wrap">
      <div class="score-bar-track">
        <div class="score-bar-fill" style="width:${scorePct}%;background:${col}"></div>
        <div class="score-threshold" style="left:${threshPct}%"></div>
      </div>
      <div class="score-bar-labels"><span>0</span><span style="color:var(--amber);font-weight:600">mín ${PASS}</span><span>${TOTAL_SCORE}</span></div>
    </div>
  </div>`;
}

function render(){
  const area=document.getElementById('area');
  if(done){renderResults(area);return;}
  const q=qs[cur],answered=ans[cur]!==undefined,ndone=Object.keys(ans).length,total=qs.length;
  const pq=scorePerQ(total);
  let h='';
  // live score banner
  h+=renderScoreLive();
  // modes
  const hw=wrongs.length>0;
  h+=`<div class="modes">
    <button class="mbtn ${mode==='normal'?'on':''}" onclick="switchTema(${JSON.stringify(tema)})">Test complet</button>
    <button class="mbtn ${mode==='review'?'on':''} ${!hw?'dim':''}" onclick="startReview()">Repasar errades ${hw?'('+wrongs.length+')':''}</button>
  </div>`;
  // progress
  const pp=Math.round(ndone/total*100);
  h+=`<div class="prog-wrap"><div class="prog-top"><span>Progrés</span><b>${ndone} / ${total} respostes</b></div><div class="prog-track"><div class="prog-fill" style="width:${pp}%"></div></div></div>`;
  // card
  h+=`<div class="qcard">`;
  if(q.bal)h+=`<div class="qtag bal">★ Illes Balears</div>`;
  if(mode==='review')h+=`<div class="qtag rev">Mode repàs</div>`;
  h+=`<div class="qnum">Pregunta ${cur+1} de ${total}</div>`;
  const qtxt=q.q.replace(/^\d+\.\s*/,'').replace('[BALEARES] ','');
  h+=`<div class="qtext">${qtxt}</div><div class="opts">`;
  q.opts.forEach((o,i)=>{
    let cls='opt'+(answered?' dis':'');
    let delta='';
    if(answered){
      if(i===q.c){cls+=' ok';if(i===ans[cur])delta=`<span class="score-delta pos">+${fmt(pq)} pts</span>`;}
      else if(i===ans[cur]){cls+=' ng';delta=`<span class="score-delta neg">-${fmt(pq/4)} pts</span>`;}
    }
    h+=`<button class="${cls}" onclick="pick(${cur},${i})"><span class="ol">${LT[i]}</span><span style="flex:1">${o}</span>${delta}</button>`;
  });
  h+=`</div>`;
  if(answered)h+=`<div class="expl on"><strong>Explicació:</strong> ${q.exp}</div>`;
  h+=`</div>`;
  // nav
  const allDone=ndone===total;
  h+=`<div class="nav">
    <button class="nbtn" onclick="go(-1)" ${cur===0?'disabled':''}>← Anterior</button>
    <span class="nctr">${cur+1}/${total}</span>
    ${allDone
      ?'<button class="nbtn pri" onclick="finish()">Veure resultats →</button>'
      :'<button class="nbtn" onclick="go(1)" '+(cur===total-1?'disabled':'')+'>Següent →</button>'}
  </div>`;
  area.innerHTML=h;
}

function renderResults(area){
  const n=qs.length,pq=scorePerQ(n);
  const ok=qs.filter((q,i)=>ans[i]===q.c).length;
  const ng=qs.filter((q,i)=>ans[i]!==undefined&&ans[i]!==q.c).length;
  const score=calcScore(ans,qs);
  const passed=score>=PASS;
  const col=scoreColor(score,TOTAL_SCORE);
  const circ=2*Math.PI*54;
  const scorePctRing=Math.max(0,Math.min(100,(score/TOTAL_SCORE)*100));
  const dash=circ*(1-scorePctRing/100);
  const msg=passed
    ?(score>=27?'Resultat excel·lent!':score>=22?'Molt bon resultat.':'Aprovat. Segueix repassant.')
    :(score>=12?'Molt a prop! Repassa els errors.':'Cal reforçar aquest temari.');

  let h=`<div class="rhero">
    <div class="ring">
      <svg viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="54" fill="none" stroke="#E5E7EB" stroke-width="9"/>
        ${score<0?'':`<circle cx="60" cy="60" r="54" fill="none" stroke="${col}" stroke-width="9" stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${dash.toFixed(2)}" stroke-linecap="round"/>`}
      </svg>
      <div class="rtext">
        <span class="rpts" style="color:${col}">${fmtShort(score)}</span>
        <span class="rover">/ ${TOTAL_SCORE} pts</span>
      </div>
    </div>
    <div class="raprueba ${passed?'si':'no'}">${passed?'✓ APROVAT':'✗ NO APROVAT'} · mínim ${PASS} pts</div>
    <div class="rtitle">${msg}</div>
    <div class="rsub">${mode==='review'?'Mode repàs · ':''}${n} preguntes</div>
    <div class="rstats">
      <div class="sc"><div class="sn g">${ok}</div><div class="sl2">Correctes</div></div>
      <div class="sc"><div class="sn r">${ng}</div><div class="sl2">Errònies</div></div>
      <div class="sc"><div class="sn a">+${fmt(pq)}</div><div class="sl2">Pts/encert</div></div>
      <div class="sc"><div class="sn gr">-${fmt(pq/4)}</div><div class="sl2">Pts/error</div></div>
    </div>
  </div>`;

  // formula reminder
  h+=`<div class="formula">
    <span>📐 <b>Fórmula:</b></span>
    <span>Correcta: <b>+${fmt(pq)}</b></span>
    <span>Errònia: <b>-${fmt(pq/4)}</b></span>
    <span>En blanc: <b>no permès</b></span>
    <span>Mínim aprovat: <b>${PASS} / ${TOTAL_SCORE}</b></span>
  </div>`;

  // breakdown per tema (only in "all" mode)
  if(tema==='all'){
    const groups=[{lbl:'Tema 12',t:12},{lbl:'Tema 13',t:13}];
    h+=`<div class="bdown"><h3>Desglose per tema</h3>`;
    groups.forEach(g=>{
      const gqs=qs.filter(q=>q._t===g.t);
      const gn=gqs.length;
      if(!gn)return;
      const gpq=scorePerQ(gn);
      const gc=qs.filter((q,i)=>q._t===g.t&&ans[i]===q.c).length;
      const gng=qs.filter((q,i)=>q._t===g.t&&ans[i]!==undefined&&ans[i]!==q.c).length;
      const gs=qs.reduce((acc,q,i)=>{
        if(q._t!==g.t)return acc;
        if(ans[i]===q.c)return acc+gpq;
        if(ans[i]!==undefined)return acc-gpq/4;
        return acc;
      },0);
      const gpass=gs>=PASS/2; // half of threshold for half the test
      const gcol=scoreColor(gs,TOTAL_SCORE/2);
      const gpct=Math.max(0,Math.min(100,(gs/(TOTAL_SCORE/2))*100));
      const thpct=(PASS/2)/(TOTAL_SCORE/2)*100;
      h+=`<div class="trow">
        <span class="tlbl">${g.lbl}</span>
        <div class="tbar">
          <div class="tbfill" style="width:${gpct}%;background:${gcol}"></div>
          <div class="tth" style="left:${thpct}%"></div>
        </div>
        <span class="tpct" style="color:${gcol}">${fmtShort(gs)} / ${TOTAL_SCORE/2}</span>
      </div>`;
    });
    h+=`</div>`;
  }

  const hw=ng>0;
  h+=`<div class="ract">
    <button class="abtn pri" onclick="reset()">Repetir test</button>
    <button class="abtn sec ${!hw?'dim':''}" onclick="startReview()">Repasar ${ng} ${ng===1?'error':'errors'}</button>
  </div>`;
  area.innerHTML=h;
}

render();
</script>
</body>
